name = "cloudflare-openai-proxy"
main = "src/index.js"
compatibility_date = "2025-09-29"
workers_dev = true

[observability]
enabled = true

[ai]
binding = "AI"

[vars]
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

[env.production]

[[env.production.routes]]
pattern = "ops.iri1968.dpdns.org"
custom_domain = true

[triggers]
crons = ["*/1 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "proxy_reliability"
database_id = "a1fa461e-da3a-41f6-aedc-22a643f74412"
migrations_dir = "migrations"
