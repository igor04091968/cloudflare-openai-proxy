name = "cloudflare-openai-proxy"
main = "src/index.js"
compatibility_date = "2025-09-29"
workers_dev = true

[observability]
enabled = true

[triggers]
crons = ["*/1 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "proxy_reliability"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"
